<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autozone 33 - Logistics HUB</title>
    <style>
        :root { --sidebar: #1a237e; --accent: #00e5ff; --header-h: 60px; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }

        /* ХАМБУРГЕР БУТОН ЗА МОБИЛНИ */
        .menu-toggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1001;
            background: var(--sidebar);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* СТРАНИЧНО МЕНЮ */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 1.4rem; color: #fff; margin: 0; }
        
        .nav-menu { flex-grow: 1; padding: 10px 0; overflow-y: auto; }
        .nav-item { 
            padding: 15px 20px; cursor: pointer; border-left: 4px solid transparent; 
            color: #cfd8dc; transition: 0.2s; font-size: 0.9rem;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--accent); }

        /* ГЛАВЕН ПРОЗОРЕЦ */
        .main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; }
        
        .top-bar { 
            height: var(--header-h); 
            background: white; 
            border-bottom: 1px solid #ddd; 
            display: flex; 
            align-items: center; 
            padding: 0 15px 0 60px; /* Място за бутона на мобилни */
            font-weight: bold; 
            color: #1a237e;
            justify-content: space-between;
        }

        .viewport { flex-grow: 1; background: white; -webkit-overflow-scrolling: touch; }
        iframe { width: 100%; height: 100%; border: none; }

        /* МОБИЛНИ НАСТРОЙКИ (Media Queries) */
        @media (max-width: 768px) {
            .menu-toggle { display: block; } /* Показваме бутона */
            
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%); /* Скриваме менюто вляво */
            }

            .sidebar.open { transform: translateX(0); } /* Показваме при клик */
            
            .top-bar { padding-left: 60px; font-size: 0.9rem; }
            
            /* Overlay ефект при отворено меню */
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .overlay.open { display: block; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div class="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>AUTOZONE 33</h2>
            <div style="font-size: 10px; color: var(--accent); font-weight: bold;">HUB PRO</div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" onclick="load('OrderV16 final.html', this)">🛒 Нова Поръчка</div>
            <div class="nav-item" onclick="load('PacinglistV7 final.html', this)">📦 Пакетиране & Етикети</div>
            <div class="nav-item" onclick="load('Nalichnost V12 Avtozona33 final.html', this)">📊 Наличности</div>
            <div class="nav-item" onclick="load('Traging final.HTML', this)">🚚 Проследяване</div>
            <div class="nav-item" onclick="load('Battery price pro V4 final.html', this)">⚖️ Сравнител Цени</div>
            <div class="nav-item" onclick="load('kasov-otchet-online V3 final.html', this)">💰 Касов Отчет</div>
            <div class="nav-item" onclick="load('autofleet PRO.html', this)">🚐 Автопарк</div>
            <div class="nav-item" onclick="load('Moto Mahager V1.html', this)">🏍️ Moto Manager</div>
        </nav>
    </aside>

    <main class="main">
        <div class="top-bar">
            <span id="title">Модул: Нова Поръчка</span>
        </div>
        <div class="viewport">
            <iframe id="frame" src="OrderV16 final.html"></iframe>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('open');
        }

        function load(file, el) {
            document.getElementById('frame').src = file;
            document.getElementById('title').innerText = "Модул: " + el.innerText;
            
            // Активен клас
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            // Затваряме менюто автоматично на мобилни след избор
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
        }

        // Поддръжка на размерите при преоразмеряване
        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.querySelector('.overlay').classList.remove('open');
            }
        });
    </script>
</body>
</html>
