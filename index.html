<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Autozone 33 - Logistics HUB</title>
    <style>
        :root { --sidebar: #1a237e; --accent: #00e5ff; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: #f0f2f5; overflow: hidden; }
        
        /* SIDEBAR СТИЛ */
        .sidebar { width: 280px; background: var(--sidebar); color: white; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 10; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { font-size: 1.5rem; letter-spacing: 1px; color: #fff; margin: 0; }
        .sidebar-header span { font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }

        .nav-menu { flex-grow: 1; padding: 20px 0; overflow-y: auto; }
        .nav-item { 
            padding: 15px 25px; cursor: pointer; border-left: 4px solid transparent; 
            color: #cfd8dc; transition: 0.3s; font-size: 0.95rem;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--accent); }

        /* ГЛАВЕН ПРОЗОРЕЦ */
        .main { flex-grow: 1; display: flex; flex-direction: column; }
        .top-bar { height: 65px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; font-weight: bold; color: #1a237e; }
        iframe { width: 100%; height: 100%; border: none; background: white; }

        .clock { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>AUTOZONE 33</h2>
            <span>Logistics Hub Pro</span>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="load('OrderV16 final.html', this)">🛒 Нова Поръчка</div>
            <div class="nav-item" onclick="load('PacinglistV7 final.html', this)">📦 Пакетиране & Етикети</div>
            <div class="nav-item" onclick="load('Nalichnost V12 Avtozona33 final.html', this)">📊 Наличности</div>
            <div class="nav-item" onclick="load('Traging final.HTML', this)">🚚 Проследяване</div>
            <div class="nav-item" onclick="load('Battery price pro V4 final.html', this)">⚖️ Сравнител Цени</div>
            <div class="nav-item" onclick="load('kasov-otchet-online V3 final.html', this)">💰 Касов Отчет</div>
            <div class="nav-item" onclick="load('autofleet PRO.html', this)">🚐 Автопарк</div>
            <div class="nav-item" onclick="load('Moto Mahager V1.html', this)">🏍️ Moto Manager</div>
        </div>
        <div style="padding: 15px; font-size: 10px; opacity: 0.4; text-align: center;">v2.0 Managed by Gemini</div>
    </div>

    <div class="main">
        <div class="top-bar">
            <span id="title">Модул: Нова Поръчка</span>
            <span id="live-clock" class="clock"></span>
        </div>
        <iframe id="frame" src="OrderV16 final.html"></iframe>
    </div>

    <script>
        function load(file, el) {
            document.getElementById('frame').src = file;
            document.getElementById('title').innerText = "Модул: " + el.innerText;
            
            // Смяна на активния бутон в менюто
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // Часовник в реално време
        function updateTime() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('bg-BG');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
