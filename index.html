<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Autozone 33 - Logistics HUB</title>
    <style>
        :root { --sidebar-bg: #1a237e; --accent: #00e5ff; --header-h: 60px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }

        /* БУТОН ЗА МЕНЮ (Хамбургер) */
        .menu-btn {
            display: none; position: fixed; top: 10px; left: 10px; z-index: 2000;
            background: var(--sidebar-bg); color: white; border: none;
            padding: 12px; border-radius: 8px; cursor: pointer; font-size: 20px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px; background: var(--sidebar-bg); color: white;
            display: flex; flex-direction: column; transition: 0.3s ease; z-index: 1500;
        }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-menu { flex-grow: 1; padding: 10px 0; overflow-y: auto; }
        .nav-item { 
            padding: 15px 20px; cursor: pointer; border-left: 4px solid transparent; 
            color: #cfd8dc; transition: 0.2s; font-size: 0.95rem;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--accent); }

        /* MAIN CONTENT */
        .main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .top-bar { 
            height: var(--header-h); background: white; border-bottom: 1px solid #ddd; 
            display: flex; align-items: center; padding: 0 20px; font-weight: bold; color: #1a237e;
        }
        .viewport { flex-grow: 1; background: white; position: relative; -webkit-overflow-scrolling: touch; }
        iframe { width: 100%; height: 100%; border: none; }

        /* МОБИЛНИ КОРЕКЦИИ */
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .top-bar { padding-left: 60px; }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1400; }
            .overlay.active { display: block; }
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>AUTOZONE 33</h2>
            <div style="font-size: 10px; color: var(--accent); font-weight: bold;">HUB PRO</div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" onclick="load('OrderV16 final.html', this)">🛒 Нова Поръчка</div>
            <div class="nav-item" onclick="load('PacinglistV7 final.html', this)">📦 Пакетиране & Етикети</div>
            <div class="nav-item" onclick="load('Nalichnost V12 Avtozona33 final.html', this)">📊 Наличности</div>
            <div class="nav-item" onclick="load('Traging final.HTML', this)">🚚 Проследяване</div>
            <div class="nav-item" onclick="load('Battery price pro V4 final.html', this)">⚖️ Сравнител Цени</div>
            <div class="nav-item" onclick="load('kasov-otchet-online V3 final.html', this)">💰 Касов Отчет</div>
            <div class="nav-item" onclick="load('autofleet PRO.html', this)">🚐 Автопарк</div>
            <div class="nav-item" onclick="load('Moto Mahager V1.html', this)">🏍️ Moto Manager</div>
        </nav>
    </aside>

    <main class="main">
        <div class="top-bar" id="title">Модул: Нова Поръчка</div>
        <div class="viewport">
            <iframe id="main-frame" src="OrderV16 final.html"></iframe>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function load(file, el) {
            document.getElementById('main-frame').src = file;
            document.getElementById('title').innerText = "Модул: " + el.innerText;
            
            // Смяна на активен стил
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            // Затваряне на менюто на мобилен
            if (window.innerWidth <= 768) {
                toggleMenu();
            }
        }
    </script>
</body>
</html>
