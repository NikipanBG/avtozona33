<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касов Отчет Онлайн - Google Drive Sync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Основни стилове за интерфейса */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f5; padding-bottom: 70px; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { cursor: pointer; border: none; border-radius: 5px; padding: 10px 15px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-success { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .gdrive-status { display: none; padding: 10px; border-radius: 5px; margin-top: 10px; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #2c3e50; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: white; text-decoration: none; font-size: 12px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h3><i class="fab fa-google-drive"></i> Синхронизация</h3>
        <p style="font-size: 13px; color: #666;">Данните се изпращат към Вашия Google Drive.</p>
        
        <div id="gdriveStatus" class="gdrive-status"></div>

        <button onclick="exportToGoogleDrive()" class="btn-success">
            <i class="fas fa-cloud-upload-alt"></i> ЗАПИШИ В GOOGLE DRIVE
        </button>

        <button onclick="exportDataLocal()" class="btn-warning">
            <i class="fas fa-file-download"></i> Локален експорт (JSON)
        </button>
    </div>

    <div class="card" id="settings-section">
        <h4><i class="fas fa-cog"></i> Настройки на връзката</h4>
        <label>Google Apps Script URL:</label>
        <input type="text" id="sheetUrl" placeholder="https://script.google.com/macros/s/...">
        <button onclick="saveSettings()" style="background: #3498db; color: white;">Запази настройките</button>
    </div>

    <script>
        // Глобални променливи (взети от твоя оригинален код)
        const STORAGE_KEY = 'avtozona33_v3';
        let CURRENT_LOCATION = localStorage.getItem('selectedLocation') || 'Неизвестен обект';

        // Зареждане на настройките при старт
        window.onload = function() {
            const savedUrl = localStorage.getItem(STORAGE_KEY + '_sheetUrl') || '';
            document.getElementById('sheetUrl').value = savedUrl;
        };

        function saveSettings() {
            const url = document.getElementById('sheetUrl').value;
            localStorage.setItem(STORAGE_KEY + '_sheetUrl', url);
            alert('✅ Настройките са запазени!');
        }

        // ОСНОВНА ФУНКЦИЯ ЗА СИНХРОНИЗАЦИЯ
        async function exportToGoogleDrive() {
            const scriptURL = document.getElementById('sheetUrl').value;
            const statusEl = document.getElementById('gdriveStatus');

            if (!scriptURL || !scriptURL.startsWith('https://script.google.com')) {
                alert('❌ Моля, въведете валиден Google Script URL в настройките!');
                return;
            }

            // Събиране на данните от локалното хранилище
            const dataToSync = {
                action: 'saveToDrive',
                filename: `Otchet_${CURRENT_LOCATION}_${new Date().toISOString().split('T')[0]}.json`,
                data: {
                    обект: CURRENT_LOCATION,
                    касиер: document.getElementById('cashierName')?.value || 'N/A',
                    продажби: JSON.parse(localStorage.getItem(STORAGE_KEY + '_sales') || '[]'),
                    служебни: JSON.parse(localStorage.getItem(STORAGE_KEY + '_services') || '[]'),
                    дата_експорт: new Date().toLocaleString('bg-BG')
                }
            };

            if (dataToSync.data.продажби.length === 0 && dataToSync.data.служебни.length === 0) {
                alert('Няма данни за изпращане!');
                return;
            }

            statusEl.className = 'gdrive-status';
            statusEl.style.display = 'block';
            statusEl.textContent = '⏳ Изпращане...';

            try {
                // Използваме fetch с no-cors за съвместимост с Google Scripts
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSync)
                });

                // При no-cors не можем да проверим response.ok, затова приемаме успех при липса на catch грешка
                statusEl.className = 'gdrive-status success';
                statusEl.textContent = '✅ Успешно записано в Google Drive!';
                alert('Данните са изпратени към облака!');
                
            } catch (error) {
                console.error('Грешка:', error);
                statusEl.className = 'gdrive-status error';
                statusEl.textContent = '❌ Грешка при връзката!';
                alert('Възникна грешка. Проверете интернет връзката.');
            }
        }

        // Локално сваляне на файл (стария метод)
        function exportDataLocal() {
            const data = {
                обект: CURRENT_LOCATION,
                продажби: JSON.parse(localStorage.getItem(STORAGE_KEY + '_sales') || '[]'),
                дата: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `otchet_${CURRENT_LOCATION}.json`;
            a.click();
        }
    </script>
</body>
</html>
